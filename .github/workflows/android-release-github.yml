name: Build and Publish Android Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: false
        default: ''
      release_body:
        description: 'Release notes'
        required: false
        default: 'Android release built from GitHub Actions.'
      prerelease:
        description: 'Mark as prerelease?'
        required: false
        default: 'false'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        working-directory: zeni_app
        run: |
          flutter pub get

      - name: Prepare keystore (from secrets)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p zeni_app/android
          echo "$KEYSTORE_BASE64" | base64 --decode > zeni_app/android/keystore.jks
          cat > zeni_app/android/key.properties <<EOF
storePassword=${{ secrets.KEYSTORE_PASSWORD }}
keyPassword=${{ secrets.KEY_PASSWORD }}
keyAlias=${{ secrets.KEY_ALIAS }}
storeFile=keystore.jks
EOF

      - name: Build AppBundle and APK
        working-directory: zeni_app
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          flutter build appbundle --release
          flutter build apk --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            zeni_app/build/app/outputs/bundle/release/*.aab
            zeni_app/build/app/outputs/flutter-apk/app-release.apk
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.release_tag }}
          release_name: ${{ github.event.inputs.release_name != '' && github.event.inputs.release_name || github.event_name == 'push' && github.ref_name || github.event.inputs.release_tag }}
          body: ${{ github.event.inputs.release_body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
