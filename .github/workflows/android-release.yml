name: Build Android AppBundle

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        working-directory: zeni_app
        run: |
          flutter pub get

      - name: Prepare keystore (from secrets)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p zeni_app/android
          echo "$KEYSTORE_BASE64" | base64 --decode > zeni_app/android/keystore.jks
          cat > zeni_app/android/key.properties <<EOF
storePassword=${{ secrets.KEYSTORE_PASSWORD }}
keyPassword=${{ secrets.KEY_PASSWORD }}
keyAlias=${{ secrets.KEY_ALIAS }}
storeFile=keystore.jks
EOF

      - name: Build AppBundle and APK
        working-directory: zeni_app
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          flutter build appbundle --release
          flutter build apk --release

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zeni_app-aab
          path: |
            zeni_app/build/app/outputs/bundle/release/*.aab

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zeni_app-apk
          path: |
            zeni_app/build/app/outputs/flutter-apk/app-release.apk
